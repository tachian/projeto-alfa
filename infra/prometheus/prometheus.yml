global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: projeto-alfa-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:4000
